<!DOCTYPE html>
<html lang="ar" dir="rtl">
<!--
  lang="ar" and dir="rtl" are the DEFAULT values shown for a split second
  before js/i18n.js runs and corrects them based on the visitor's saved
  language choice. They don't need manual editing.
-->
<head>
  <script>
  // Runs immediately, before anything else loads or paints — applies
  // the visitor's saved theme/language right away, so there's no flash
  // of the wrong theme or a mirrored layout while the rest of the page
  // is still loading.
  (function() {
    var theme = localStorage.getItem("ccr_theme") || "dark";
    var lang = localStorage.getItem("ccr_lang") || "ar";
    var dir = lang === "ar" ? "rtl" : "ltr";
    document.documentElement.setAttribute("data-theme", theme);
    document.documentElement.setAttribute("lang", lang);
    document.documentElement.setAttribute("dir", dir);
  })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call Center Reviews Egypt</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!--
    FONT LOADING — 5 families: Fraunces (English headings), IBM Plex Sans
    (English body), IBM Plex Sans Arabic (Arabic body), IBM Plex Mono
    (numbers/stats), Markazi Text (Arabic headings).
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Markazi+Text:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="wrap">

  <!-- =====================================================
       HEADER
       Full logo header — same pattern as index.html (deliberately,
       not company.html's minimal topbar). Logo IS a clickable link
       back home here, unlike on index.html, since this page is
       never the homepage itself.
       ===================================================== -->
  <header>
    <div class="header-row">
      <div class="header-main anim-in" style="--delay: 0s">
        <div class="logo"><a href="index.html">Call Center Reviews <span>Egypt</span></a></div>
      </div>
      <div class="header-controls">
        <button class="hamburger-btn" id="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="nav-panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Slide-in navigation menu: identical markup on every page -->
  <div class="nav-overlay" id="nav-overlay" onclick="closeNav()"></div>
  <nav class="nav-panel" id="nav-panel" aria-hidden="true">
    <button class="nav-close" id="nav-close" aria-label="Close menu" onclick="closeNav()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="navHome"></a></li>
      <li><a href="submit-review.html" data-i18n="navSubmit"></a></li>
      <li><a href="compare.html" data-i18n="navCompare"></a></li>
      <li><a href="about.html" data-i18n="navAbout"></a></li>
    </ul>
    <div class="nav-toggles">
      <button class="pill-btn" id="lang-toggle" aria-label="Switch language">EN</button>
      <button class="pill-btn" id="theme-toggle" aria-label="Switch theme">☀</button>
    </div>
  </nav>

  <!-- =====================================================
       STORY
       The page's main (and only) "about" content — replaced an
       earlier Why/How/Vision section split that was redundant
       with this narrative.
       ===================================================== -->
  <section class="about-section anim-in" style="--delay:.1s">

    <p data-i18n="aboutStoryP1"></p>
    <p data-i18n="aboutStoryP2"></p>
    <p data-i18n="aboutStoryP3"></p>
    <p data-i18n="aboutStoryP4"></p>
    <p data-i18n="aboutStoryP5"></p>
  </section>

  <footer data-i18n="footer"></footer>

</div>

<!--
  SCRIPTS: i18n.js (translations + toggles), nav.js (hamburger menu).
  No page-specific script needed — this page is entirely static content.
-->
<script src="js/i18n.js"></script>
<script src="js/nav.js"></script>

</body>
</html>
